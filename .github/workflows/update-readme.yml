name: Update README

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/counter.txt
            README.md
          sparse-checkout-cone-mode: false

      - name: Increment counter
        run: |
          count=$(cat .github/counter.txt)
          new_count=$((count + 1))
          echo $new_count > .github/counter.txt
          echo "count=$new_count" >> $GITHUB_OUTPUT
        id: counter

      - name: Generate README
        if: steps.counter.outputs.count == '5'
        run: node .github/scripts/generate-readme.js

      - name: Commit and Push
        if: steps.counter.outputs.count == '5'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo 0 > .github/counter.txt
          git add README.md .github/counter.txt
          git diff --quiet || git commit -m "docs: auto-update README stats"
          git push
